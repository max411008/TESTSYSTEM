<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>題庫瀏覽</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="browse-body">
    <main class="container browse-container">
      <section class="browse-hero">
        <div class="browse-top-actions">
          <a class="button-link nav-link" href="./index.html">返回模擬考首頁</a>
          <a class="button-link primary-link" href="./index.html#exam-section">回到做題區</a>
        </div>
        <h1>題庫瀏覽頁</h1>
        <p class="hint">手機優先閱讀版，可直接查找整份 2690 題，並切換全部、星號或錯題。</p>
      </section>

      <section class="card browse-toolbar">
        <label for="browse-search">搜尋題目</label>
        <input id="browse-search" type="search" placeholder="輸入題號、關鍵字、分類" />
        <div class="browse-filter-group">
          <button id="filter-all-btn" type="button" class="filter-btn active">全部</button>
          <button id="filter-starred-btn" type="button" class="filter-btn">星號題</button>
          <button id="filter-wrong-btn" type="button" class="filter-btn">錯題</button>
        </div>
        <div id="browse-summary" class="hint">讀取中...</div>
      </section>

      <section id="browse-list" class="browse-list"></section>

      <section class="card browse-pager">
        <button id="browse-prev-btn" type="button">上一頁</button>
        <div class="browse-jump">
          <label for="browse-page-input">跳到第</label>
          <input id="browse-page-input" type="number" min="1" inputmode="numeric" />
          <span>頁</span>
          <button id="browse-jump-btn" type="button" class="secondary-btn">前往</button>
        </div>
        <div id="browse-page-info" class="hint"></div>
        <button id="browse-next-btn" type="button">下一頁</button>
      </section>
    </main>

    <div class="browse-fab-group">
      <button id="scroll-top-btn" type="button" class="fab-btn" aria-label="回到最上面">↑</button>
      <button id="scroll-bottom-btn" type="button" class="fab-btn" aria-label="到最下面">↓</button>
    </div>

    <script src="./browse.js" type="module"></script>
  </body>
</html>
