<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智慧題庫模擬考</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>智慧題庫模擬考系統</h1>

      <section class="card">
        <h2>1) 上傳題庫檔案</h2>
        <p>支援 Word(.docx) / PDF(.pdf) / Excel(.xlsx/.xls) / TXT(.txt)</p>
        <p class="hint">資料只存你自己的瀏覽器，不需要後端網址。</p>
        <form id="upload-form">
          <input id="file-input" type="file" accept=".pdf,.docx,.xlsx,.xls,.txt" required />
          <button type="submit">上傳並抽題</button>
        </form>
        <div id="upload-result" class="hint"></div>
      </section>

      <section class="card">
        <h2>2) 建立模擬考</h2>
        <label for="exam-count">題數：</label>
        <input id="exam-count" type="number" min="1" value="10" />
        <button id="start-exam-btn" type="button">開始考試</button>
        <button id="clear-bank-btn" class="danger" type="button">清空題庫</button>
        <div id="bank-info" class="hint"></div>
      </section>

      <section id="exam-section" class="card hidden">
        <h2>3) 作答區</h2>
        <div id="exam-progress" class="hint"></div>
        <form id="exam-form"></form>
        <div id="exam-nav" class="exam-nav">
          <button id="prev-question-btn" type="button">上一題</button>
          <button id="next-question-btn" type="button">下一題</button>
          <button id="submit-exam-btn" type="button">交卷</button>
        </div>
      </section>

      <section id="result-section" class="card hidden">
        <h2>4) 成績與解析</h2>
        <div id="score"></div>
        <div id="result-list"></div>
      </section>

      <section class="card">
        <h2>5) 考試紀錄與統計</h2>
        <div id="history-summary" class="hint"></div>
        <button id="clear-history-btn" class="danger" type="button">清空考試紀錄</button>
        <div id="history-list"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
