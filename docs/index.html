<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智慧題庫模擬考</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>智慧題庫模擬考系統</h1>

      <section class="card">
        <h2>1) 載入題庫</h2>
        <p class="hint">此版本已改為內建題庫模式，不再提供上傳題庫。</p>
        <label for="import-mode">匯入模式：</label>
        <select id="import-mode">
          <option value="replace">覆蓋現有題庫</option>
          <option value="append">追加到現有題庫</option>
        </select>
        <button id="clear-all-bank-btn" class="danger" type="button">先清空總題庫</button>
        <button id="load-default-btn" type="button">載入內建題庫（802396666）</button>
        <button id="load-pg11501-btn" type="button">載入內建題庫（品管土建115年1月）</button>
        <button id="load-mixed-btn" type="button">載入混合題庫（兩套合併）</button>
        <div id="load-result" class="hint"></div>
      </section>

      <section class="card">
        <h2>2) 建立模擬考</h2>
        <label for="exam-count">題數：</label>
        <input id="exam-count" type="number" min="1" value="10" />
        <button id="start-exam-btn" type="button">開始考試</button>
        <button id="clear-bank-btn" class="danger" type="button">清空題庫</button>
        <div id="bank-info" class="hint"></div>
      </section>

      <section id="exam-section" class="card hidden">
        <h2>3) 作答區</h2>
        <div id="exam-progress" class="hint"></div>
        <form id="exam-form"></form>
        <div id="exam-nav" class="exam-nav">
          <button id="prev-question-btn" type="button">上一題</button>
          <button id="next-question-btn" type="button">下一題</button>
          <button id="submit-exam-btn" type="button">交卷</button>
        </div>
      </section>

      <section id="result-section" class="card hidden">
        <h2>4) 成績與解析</h2>
        <div id="score"></div>
        <div id="result-list"></div>
      </section>

      <section class="card">
        <h2>5) 考試紀錄與統計</h2>
        <div id="history-summary" class="hint"></div>
        <button id="clear-history-btn" class="danger" type="button">清空考試紀錄</button>
        <div id="history-list"></div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
