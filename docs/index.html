<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智慧題庫模擬考</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>智慧題庫模擬考系統</h1>

      <section class="card">
        <h2>帳號登入與同步</h2>
        <div id="auth-status" class="hint">尚未登入</div>
        <div id="auth-form">
          <label for="auth-username">帳號</label>
          <input id="auth-username" type="text" placeholder="例如：maxlin01" />
          <label for="auth-password">密碼</label>
          <input id="auth-password" type="password" placeholder="至少 6 碼" />
          <button id="auth-signup-btn" type="button">註冊</button>
          <button id="auth-login-btn" type="button">登入</button>
          <button id="auth-logout-btn" class="danger" type="button">登出</button>
        </div>
        <div id="sync-status" class="hint">尚未同步</div>
      </section>

      <section class="card">
        <h2>載入題庫</h2>
        <p class="hint">此版本固定使用內建題庫：品管(土建) 2690 題（115年1月起適用）。</p>
        <button id="load-pcc2690-btn" type="button">載入內建題庫（2690題）</button>
        <a class="button-link" href="./browse.html">開啟題庫瀏覽頁</a>
        <div id="load-result" class="hint"></div>
      </section>

      <section class="card">
        <h2>建立模擬考</h2>
        <label for="exam-count">題數：</label>
        <input id="exam-count" type="number" min="1" value="10" />
        <label for="shuffle-options-toggle">
          <input id="shuffle-options-toggle" type="checkbox" />
          選項亂數模式
        </label>
        <button id="start-exam-btn" type="button">開始考試</button>
        <button id="start-wrong-exam-btn" type="button">刷錯題</button>
        <button id="start-starred-exam-btn" type="button">只刷星號題</button>
        <button id="start-starred-wrong-exam-btn" type="button">刷星號＋錯題</button>
        <button id="clear-bank-btn" class="danger" type="button">清空題庫</button>
        <div id="bank-info" class="hint"></div>
      </section>

      <section id="exam-section" class="card hidden">
        <h2>作答區</h2>
        <div id="exam-progress" class="hint"></div>
        <form id="exam-form"></form>
        <div id="exam-nav" class="exam-nav">
          <button id="prev-question-btn" type="button">上一題</button>
          <button id="next-question-btn" type="button">下一題</button>
          <button id="submit-exam-btn" type="button">交卷</button>
        </div>
      </section>

      <section id="result-section" class="card hidden">
        <h2>成績與解析</h2>
        <div id="score"></div>
        <div id="result-list"></div>
      </section>

      <section class="card">
        <h2>星號註記題目</h2>
        <div id="starred-summary" class="hint"></div>
        <button id="clear-starred-btn" class="danger" type="button">清空所有星號</button>
        <div id="starred-list"></div>
      </section>

      <section class="card">
        <h2>錯題題目</h2>
        <div id="wrong-summary" class="hint"></div>
        <button id="clear-wrong-btn" class="danger" type="button">清空所有錯題</button>
        <div id="wrong-list"></div>
      </section>

      <section class="card">
        <h2>考試紀錄與統計</h2>
        <div id="history-summary" class="hint"></div>
        <button id="clear-history-btn" class="danger" type="button">清空考試紀錄</button>
        <div id="history-list"></div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
